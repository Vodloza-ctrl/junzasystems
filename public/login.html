<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login | Sale Company</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <main class="wrap" style="max-width:480px;padding:60px 0">
    <div class="card">
      <p class="eyebrow">Tenant Login</p>
      <h1>Access your dashboard</h1>

      <form id="login-form" class="form">
        <input id="login-email" class="input" type="email" placeholder="Email address" required>
        <input id="login-password" class="input" type="password" placeholder="Password" required>
        <button class="btn gold" type="submit">Login</button>
      </form>

      <p class="muted" id="login-message" style="margin-top:12px">
        Supabase handles identity. Cloudflare Worker controls tenant authority.
      </p>

      <hr style="border:0;border-top:1px solid rgba(0,0,0,.08);margin:22px 0">

      <p class="muted">
        First test user? Create the user inside Supabase Auth, then use those credentials here.
      </p>

      <button id="signup-test" class="btn" type="button" style="width:100%;margin-top:10px">
        Create test account with these details
      </button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    const message = document.getElementById("login-message");

    window.SaleAuth.redirectIfLoggedIn();

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      try {
        message.textContent = "Signing in...";
        await window.SaleAuth.signIn(email, password);
        window.location.href = "dashboard.html";
      } catch (error) {
        message.textContent = error.message;
      }
    });

    document.getElementById("signup-test").addEventListener("click", async () => {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      if (!email || !password) {
        message.textContent = "Enter an email and password first.";
        return;
      }

      try {
        message.textContent = "Creating test account...";
        await window.SaleAuth.signUp(email, password);
        message.textContent = "Account created. Check email confirmation if Supabase requires it, then log in.";
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
